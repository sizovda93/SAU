services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    environment:
      - API_PORT=3001
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "8888:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
